name: Play Store Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # Still allow manual trigger if needed

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create Production .env file
        run: |
          echo "FIREBASE_ANDROID_API_KEY=${{ secrets.ANDROID_KEY }}" > .env
          echo "FIREBASE_IOS_API_KEY=${{ secrets.IOS_KEY }}" >> .env
          echo "FIREBASE_WEB_API_KEY=${{ secrets.WEB_KEY }}" >> .env

      - name: Decode Firebase Configuration Files
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Auto-increment version
        run: |
          # Use GitHub run number as build number (always increases)
          BUILD_NUMBER=${{ github.run_number }}
          # Force version name to 1.0.X
          VERSION_NAME="1.0.${BUILD_NUMBER}"
          
          # Update pubspec.yaml with new version+build
          sed -i "s/version: .*/version: ${VERSION_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          
          # Set env variables for subsequent steps
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "Building version: ${VERSION_NAME}+${BUILD_NUMBER}"

      - name: Build App Bundle & APK
        run: |
          flutter build appbundle --release --build-name=${{ env.VERSION_NAME }} --build-number=${{ env.BUILD_NUMBER }}
          flutter build apk --release --build-name=${{ env.VERSION_NAME }} --build-number=${{ env.BUILD_NUMBER }}

      - name: Release Summary
        run: |
          echo "🚀 Preparing Release"
          echo "-------------------"
          echo "Version Name: ${{ env.VERSION_NAME }}"
          echo "Version Code: ${{ env.BUILD_NUMBER }}"
          echo "Package Name: ${{ secrets.PACKAGE_NAME }}"
          echo "Target Track: Internal"
          echo ""
          echo "📝 Release Notes (Copy-paste to Play Console if needed):"
          echo "--------------------------------------------------------"
          cat distribution/whatsnew/whatsnew-en-US
          echo ""
          echo "--------------------------------------------------------"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

